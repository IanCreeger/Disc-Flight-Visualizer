<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Disc Golf Flight Visualizer</title>
    <style>
        :root {
            --bg-dark: #121214;
            --card-dark: #1e1e24;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-green: #10b981;
            --accent-green-hover: #059669;
            --accent-blue: #3b82f6;
            --border-color: #374151;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 1050px;
            background-color: var(--card-dark);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr;
        }

        @media (min-width: 900px) {
            .app-container {
                grid-template-columns: 420px 1fr;
            }
        }

        /* Sidebar Styling */
        .sidebar {
            padding: 25px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            max-height: 90vh;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            color: var(--accent-green);
        }

        .header p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Input Controls & Groups */
        .control-section {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 700;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
        }

        .label-val {
            color: var(--accent-green);
            font-family: monospace;
            font-weight: bold;
        }

        select {
            background-color: #2a2a35;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--accent-green);
        }

        /* Flight Numbers Row styling */
        .flight-number-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background-color: #121214;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
        }

        .flight-stat {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 9px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent-green);
        }

        /* Ranges */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #2a2a35;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent-green);
            cursor: pointer;
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Action Buttons */
        .btn {
            background-color: var(--accent-green);
            color: #121214;
            font-weight: 700;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn:hover {
            background-color: var(--accent-green-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: #2a2a35;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #353542;
        }

        /* Preset Chips */
        .presets {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .preset-chip {
            background-color: #2a2a35;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 11px;
            padding: 6px 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-chip:hover {
            border-color: var(--accent-green);
            background-color: #30303e;
        }

        /* Map Canvas Workspace */
        .visualizer-container {
            position: relative;
            background-color: #0b0b0d;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            aspect-ratio: 1 / 1.4;
            max-height: 90vh;
        }

        @media (min-width: 900px) {
            .visualizer-container {
                aspect-ratio: auto;
                height: 100%;
            }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Dynamic Overlay UI */
        .overlay-hud {
            position: relative;
            z-index: 10;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .hud-card {
            background-color: rgba(30, 30, 36, 0.85);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 14px;
            border-radius: 8px;
            pointer-events: auto;
        }

        .spin-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .spin-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--accent-blue);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .stats-hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }

        .stats-hud-data {
            font-size: 12px;
            font-family: monospace;
            color: var(--text-muted);
        }

        .stats-hud-data span {
            color: var(--accent-green);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Configuration Sidebar -->
    <div class="sidebar">
        <div class="header">
            <h1>Disc <span>Flight</span> Lab</h1>
            <p>Physics-accurate flight trajectory sandbox</p>
        </div>

        <!-- Bio-Mechanic Inputs -->
        <div class="control-section">
            <div class="section-title">Throw Mechanics</div>
            <div class="grid-2">
                <div class="input-group">
                    <label for="handedness">Dominant Hand</label>
                    <select id="handedness">
                        <option value="right" selected>Right Hand</option>
                        <option value="left">Left Hand</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="throwType">Throw Type</label>
                    <select id="throwType">
                        <option value="backhand" selected>Backhand</option>
                        <option value="forehand">Forehand (Flick)</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="releaseAngle">Release Angle</label>
                <select id="releaseAngle">
                    <option value="flat" selected>Flat (Parallel)</option>
                    <option value="hyzer">Hyzer (Wing Tilted Down)</option>
                    <option value="anhyzer">Anhyzer (Wing Tilted Up)</option>
                </select>
            </div>
        </div>

        <!-- Disc Rating Inputs -->
        <div class="control-section">
            <div class="section-title">Disc Aerodynamics</div>
            
            <div class="flight-number-grid">
                <div class="flight-stat">
                    <span class="stat-label">Speed</span>
                    <span class="stat-value" id="hudSpeed">9</span>
                </div>
                <div class="flight-stat">
                    <span class="stat-label">Glide</span>
                    <span class="stat-value" id="hudGlide">5</span>
                </div>
                <div class="flight-stat">
                    <span class="stat-label">Turn</span>
                    <span class="stat-value" id="hudTurn">-1</span>
                </div>
                <div class="flight-stat">
                    <span class="stat-label">Fade</span>
                    <span class="stat-value" id="hudFade">2</span>
                </div>
            </div>

            <div class="input-group">
                <label for="speed">Speed <span class="label-val" id="valSpeed">9</span></label>
                <input type="range" id="speed" min="1" max="14" value="9" step="1">
            </div>

            <div class="input-group">
                <label for="glide">Glide <span class="label-val" id="valGlide">5</span></label>
                <input type="range" id="glide" min="1" max="7" value="5" step="0.5">
            </div>

            <div class="input-group">
                <label for="turn">Turn (Stability) <span class="label-val" id="valTurn">-1</span></label>
                <input type="range" id="turn" min="-5" max="1" value="-1" step="0.5">
            </div>

            <div class="input-group">
                <label for="fade">Fade <span class="label-val" id="valFade">2</span></label>
                <input type="range" id="fade" min="0" max="5" value="2" step="0.5">
            </div>
        </div>

        <!-- Preset Templates -->
        <div class="control-section">
            <div class="section-title">Presets & Molds</div>
            <div class="presets">
                <button class="preset-chip" onclick="applyPreset(12, 5, -1, 3)">Destroyer (Stable Driver)</button>
                <button class="preset-chip" onclick="applyPreset(5, 4, -1, 1)">Buzzz (Neutral Midrange)</button>
                <button class="preset-chip" onclick="applyPreset(7, 7, -2, 1)">River (High Glide)</button>
                <button class="preset-chip" onclick="applyPreset(9, 3, 0, 4)">Firebird (Utility Overstable)</button>
                <button class="preset-chip" onclick="applyPreset(2, 3, 0, 0)">Aviar (Straight Putter)</button>
            </div>
        </div>

        <!-- Simulation Actions -->
        <div class="control-section" style="margin-top: auto; padding-top: 20px;">
            <button class="btn" id="btnThrow">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                Launch Throw
            </button>
        </div>
    </div>

    <!-- Active Visualizer Frame -->
    <div class="visualizer-container">
        <!-- Top Overlay Heads-Up Display -->
        <div class="overlay-hud">
            <div class="hud-card spin-indicator">
                <div class="spin-dot" id="spinIndicatorDot"></div>
                <span id="spinText">Clockwise Spin</span>
            </div>
            <div class="hud-card" id="flightTypeLabel" style="font-size: 12px; font-weight: 700;">
                RHBH Profile
            </div>
        </div>

        <canvas id="flightCanvas"></canvas>

        <!-- Bottom Stats Overlay -->
        <div class="stats-hud hud-card">
            <div class="stats-hud-data">Distance: <span id="hudDistance">0 ft</span></div>
            <div class="stats-hud-data">Max Turn Deviation: <span id="hudMaxDeviation">0 ft</span></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('flightCanvas');
    const ctx = canvas.getContext('2d');

    // UI elements mapping
    const elements = {
        handedness: document.getElementById('handedness'),
        throwType: document.getElementById('throwType'),
        releaseAngle: document.getElementById('releaseAngle'),
        speed: document.getElementById('speed'),
        glide: document.getElementById('glide'),
        turn: document.getElementById('turn'),
        fade: document.getElementById('fade'),
        btnThrow: document.getElementById('btnThrow'),
        spinText: document.getElementById('spinText'),
        spinIndicatorDot: document.getElementById('spinIndicatorDot'),
        flightTypeLabel: document.getElementById('flightTypeLabel'),
        hudDistance: document.getElementById('hudDistance'),
        hudMaxDeviation: document.getElementById('hudMaxDeviation')
    };

    // Animation variables
    let animationFrameId = null;
    let animProgress = 1.0; // 0.0 to 1.0. 1.0 means static fully drawn path

    function resizeCanvas() {
        const container = canvas.parentElement;
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width * window.devicePixelRatio;
        canvas.height = rect.height * window.devicePixelRatio;
        draw();
    }

    // Helper functions to retrieve active parameters
    function getInputs() {
        return {
            hand: elements.handedness.value,
            throwType: elements.throwType.value,
            angle: elements.releaseAngle.value,
            speed: parseFloat(elements.speed.value),
            glide: parseFloat(elements.glide.value),
            turn: parseFloat(elements.turn.value),
            fade: parseFloat(elements.fade.value)
        };
    }

    function applyPreset(speed, glide, turn, fade) {
        elements.speed.value = speed;
        elements.glide.value = glide;
        elements.turn.value = turn;
        elements.fade.value = fade;
        updateDisplays();
        triggerDraw();
    }

    function updateDisplays() {
        const config = getInputs();
        
        // Sync sliders & numeric display tags
        document.getElementById('valSpeed').innerText = config.speed;
        document.getElementById('valGlide').innerText = config.glide;
        document.getElementById('valTurn').innerText = config.turn;
        document.getElementById('valFade').innerText = config.fade;

        document.getElementById('hudSpeed').innerText = config.speed;
        document.getElementById('hudGlide').innerText = config.glide;
        document.getElementById('hudTurn').innerText = config.turn;
        document.getElementById('hudFade').innerText = config.fade;

        // Calculate spin orientation
        // Clockwise spin: Right Hand Backhand (RHBH) and Left Hand Forehand (LHFH)
        // Counter-clockwise spin: Right Hand Forehand (RHFH) and Left Hand Backhand (LHBH)
        const isClockwise = (config.hand === 'right' && config.throwType === 'backhand') || 
                            (config.hand === 'left' && config.throwType === 'forehand');

        if (isClockwise) {
            elements.spinText.innerText = "Clockwise Spin (CW)";
            elements.spinIndicatorDot.style.backgroundColor = "var(--accent-blue)";
        } else {
            elements.spinText.innerText = "Counter-Clockwise Spin (CCW)";
            elements.spinIndicatorDot.style.backgroundColor = "#e11d48"; // Rose color
        }

        // Build descriptive display badge
        const designator = `${config.hand.toUpperCase().slice(0,1)}H${config.throwType.toUpperCase().slice(0,1)}`;
        elements.flightTypeLabel.innerText = `${designator} Flight Path`;
    }

    // Aerodynamic curve coordinate calculator
    function getPathPoints(config, steps = 100) {
        const points = [];
        const logicalW = canvas.width / window.devicePixelRatio;
        const logicalH = canvas.height / window.devicePixelRatio;

        const startX = logicalW / 2;
        const startY = logicalH - 45;

        // Base flight calculation metrics
        const baseDistanceFt = (config.speed * 26) + (config.glide * 16) + 100; 
        const yPixelsScale = logicalH - 80; 
        const maxFlightHeightPixels = (baseDistanceFt / 500) * yPixelsScale;

        // Is spin CW (clockwise)?
        const isCW = (config.hand === 'right' && config.throwType === 'backhand') || 
                     (config.hand === 'left' && config.throwType === 'forehand');
        
        // Horizontal multiplier (+1 for Right Hand Backhand/Left Hand Forehand, -1 for mirrored throws)
        const spinMultiplier = isCW ? 1 : -1;

        // 1. High Speed Turn Drift Offset (curves right for CW, left for CCW)
        // Turn is a negative stat. An understable disc (like -3) turns significantly more.
        let turnAmount = config.turn * (config.speed / 7) * 20 * spinMultiplier;

        // 2. Low Speed Fade Drift Offset (curves left for CW, right for CCW)
        // Fade is a positive stat.
        let fadeAmount = -config.fade * 18 * spinMultiplier;

        // 3. Release Angle Modifications
        let launchAngleOffset = 0; 
        if (config.angle === 'hyzer') {
            // Adds left curve (CW) / right curve (CCW) early, fights turn
            launchAngleOffset = -30 * spinMultiplier;
            fadeAmount -= 15 * spinMultiplier;
        } else if (config.angle === 'anhyzer') {
            // Exaggerates early turn to the right (CW) / left (CCW)
            launchAngleOffset = 30 * spinMultiplier;
            fadeAmount += 8 * spinMultiplier;
        }

        // Generate coordinates along bezier-like logic matching physics states
        for (let i = 0; i <= steps; i++) {
            const t = i / steps; // progression of the flight 0 to 1

            // Y coordinate goes upward
            const y = startY - (t * maxFlightHeightPixels);

            // Turn happens early in flight (peak transition around 35%-50% distance)
            const turnFactor = Math.sin(t * Math.PI * 0.75) * (1 - t);
            
            // Fade starts late in flight (curves in dynamically around 60%-100%)
            const fadeFactor = Math.pow(t, 2.5);

            // Initial Release Angle trajectory influence
            const launchFactor = t * (1 - t * 0.5);

            // Compute dynamic X drift
            const x = startX + 
                      (launchFactor * launchAngleOffset) + 
                      (turnFactor * turnAmount) + 
                      (fadeFactor * fadeAmount);

            points.push({ x, y, distance: Math.round(t * baseDistanceFt) });
        }

        return { points, baseDistance: baseDistanceFt, startX };
    }

    function draw() {
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

        const logicalW = w / window.devicePixelRatio;
        const logicalH = h / window.devicePixelRatio;

        // Draw Fairway Distance Markers
        ctx.strokeStyle = '#23232a';
        ctx.lineWidth = 1;
        ctx.fillStyle = '#4b5563';
        ctx.font = '10px monospace';
        ctx.textAlign = 'left';

        for (let ft = 100; ft <= 500; ft += 100) {
            let y = (logicalH - 45) - (ft * ((logicalH - 80) / 500));
            ctx.beginPath();
            ctx.moveTo(15, y);
            ctx.lineTo(logicalW - 15, y);
            ctx.stroke();
            ctx.fillText(ft + ' ft', 15, y - 5);
        }

        // Center line
        ctx.strokeStyle = '#18181e';
        ctx.beginPath();
        ctx.setLineDash([6, 8]);
        ctx.moveTo(logicalW / 2, 0);
        ctx.lineTo(logicalW / 2, logicalH);
        ctx.stroke();
        ctx.setLineDash([]);

        // Get calculations
        const config = getInputs();
        const { points, baseDistance, startX } = getPathPoints(config);

        // Draw Flight Path Line up to animProgress
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        
        const limitIndex = Math.floor(points.length * animProgress);
        for (let i = 1; i < limitIndex; i++) {
            ctx.lineTo(points[i].x, points[i].y);
        }
        
        ctx.strokeStyle = 'var(--accent-green)';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'rgba(16, 185, 129, 0.4)';
        ctx.stroke();
        ctx.shadowBlur = 0; // Reset shadow

        // Render animated disc glider
        if (limitIndex > 0 && limitIndex < points.length) {
            const discPos = points[limitIndex - 1];
            ctx.beginPath();
            ctx.arc(discPos.x, discPos.y, 7, 0, 2 * Math.PI);
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#fff';
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // Draw Teepad/Starting Base Dot
        ctx.beginPath();
        ctx.arc(startX, logicalH - 45, 6, 0, 2 * Math.PI);
        ctx.fillStyle = '#374151';
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();

        // Calculate and update stats on display
        const activeDist = Math.round(baseDistance * animProgress);
        elements.hudDistance.innerText = `${activeDist} ft`;

        // Calculate Maximum turn drift (the furthest offset value in flight)
        let maxDev = 0;
        for (let i = 0; i < limitIndex; i++) {
            const dev = Math.abs(points[i].x - startX);
            if (dev > maxDev) maxDev = dev;
        }
        // Conversion factor from canvas pixels to physical feet approximation
        const maxDevFeet = Math.round(maxDev * (500 / (logicalH - 80)) * 0.7);
        elements.hudMaxDeviation.innerText = `${maxDevFeet} ft`;

        ctx.setTransform(1, 0, 0, 1, 0, 0); // reset scale
    }

    function triggerDraw() {
        if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
            animationFrameId = null;
        }
        draw();
    }

    function startFlightAnimation() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        animProgress = 0.0;
        
        const duration = 2200; // milliseconds
        const startTime = performance.now();

        function step(timestamp) {
            const elapsed = timestamp - startTime;
            animProgress = Math.min(elapsed / duration, 1.0);
            draw();

            if (animProgress < 1.0) {
                animationFrameId = requestAnimationFrame(step);
            }
        }
        animationFrameId = requestAnimationFrame(step);
    }

    // Attach interaction listeners to controls
    const inputIds = ['speed', 'glide', 'turn', 'fade', 'releaseAngle', 'handedness', 'throwType'];
    inputIds.forEach(id => {
        elements[id].addEventListener('input', () => {
            updateDisplays();
            triggerDraw();
        });
        elements[id].addEventListener('change', () => {
            updateDisplays();
            triggerDraw();
        });
    });

    elements.btnThrow.addEventListener('click', startFlightAnimation);
    window.addEventListener('resize', resizeCanvas);

    // Bootstrap
    updateDisplays();
    setTimeout(resizeCanvas, 100);
</script>

</body>
</html>
