<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disc Golf Flight Visualizer</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #4caf50;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { text-align: center; margin-top: 0; color: var(--accent-color); }
        .app-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .app-layout { grid-template-columns: 350px 1fr; }
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label { font-weight: bold; font-size: 14px; }
        .value-display { float: right; color: var(--accent-color); }
        input[type="range"] { width: 100%; accent-color: var(--accent-color); }
        select {
            padding: 8px;
            background: #444;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
        }
        .visualizer {
            background: #111;
            border-radius: 8px;
            position: relative;
            aspect-ratio: 1 / 1.5;
            width: 100%;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Disc Flight Visualizer</h1>
    <div class="app-layout">
        <!-- Input Sidebar -->
        <div class="controls">
            <div class="control-group">
                <label>Release Angle</label>
                <select id="releaseAngle">
                    <option value="flat">Flat</option>
                    <option value="hyzer">Hyzer (Tilted Left)</option>
                    <option value="anhyzer">Anhyzer (Tilted Right)</option>
                </select>
            </div>
            <div class="control-group">
                <label>Speed <span class="value-display" id="speedVal">9</span></label>
                <input type="range" id="speed" min="1" max="14" value="9" step="1">
            </div>
            <div class="control-group">
                <label>Glide <span class="value-display" id="glideVal">5</span></label>
                <input type="range" id="glide" min="1" max="7" value="5" step="0.5">
            </div>
            <div class="control-group">
                <label>Turn <span class="value-display" id="turnVal">-1</span></label>
                <input type="range" id="turn" min="-5" max="1" value="-1" step="0.5">
            </div>
            <div class="control-group">
                <label>Fade <span class="value-display" id="fadeVal">2</span></label>
                <input type="range" id="fade" min="0" max="5" value="2" step="0.5">
            </div>
        </div>
        <!-- Canvas Fairway Map -->
        <div class="visualizer">
            <canvas id="flightCanvas"></canvas>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('flightCanvas');
    const ctx = canvas.getContext('2d');

    // Inputs
    const inputs = ['speed', 'glide', 'turn', 'fade', 'releaseAngle'];
    const elements = {};
    inputs.forEach(id => elements[id] = document.getElementById(id));

    function resizeCanvas() {
        // Handle crisp rendering on high-res displays
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * window.devicePixelRatio;
        canvas.height = rect.height * window.devicePixelRatio;
        drawFlightPath();
    }

    function drawFlightPath() {
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

        const logicalW = w / window.devicePixelRatio;
        const logicalH = h / window.devicePixelRatio;

        // Draw Fairway Lines
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.fillStyle = '#666';
        ctx.font = '12px sans-serif';

        // Distance markers every 100ft scaled down
        for(let ft = 100; ft <= 500; ft += 100) {
            let y = logicalH - (ft * (logicalH / 500));
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(logicalW, y);
            ctx.stroke();
            ctx.fillText(ft + ' ft', 10, y - 5);
        }

        // Midline
        ctx.beginPath();
        ctx.setLineDash([5, 5]);
        ctx.moveTo(logicalW / 2, 0);
        ctx.lineTo(logicalW / 2, logicalH);
        ctx.stroke();
        ctx.setLineDash([]);

        // Read slider values
        const speed = parseFloat(elements.speed.value);
        const glide = parseFloat(elements.glide.value);
        const turn = parseFloat(elements.turn.value);
        const fade = parseFloat(elements.fade.value);
        const angle = elements.releaseAngle.value;

        // Dynamic Bezier plot mimicking disc aerodynamics
        const startX = logicalW / 2;
        const startY = logicalH - 20;

        // Physics translation math
        const totalDistance = (speed * 25) + (glide * 15);
        let turnIntensity = turn * (speed / 7) * 12;
        let fadeIntensity = fade * 15;

        // Apply release angle offsets
        if (angle === 'hyzer') {
            turnIntensity += 25; // Fights right drift
            fadeIntensity += 15; // Dumps harder left
        } else if (angle === 'anhyzer') {
            turnIntensity -= 30; // Forces early right drift
            fadeIntensity -= 10; // Delays left hook
        }

        const peakY = startY - (totalDistance * 0.6);
        const endY = startY - totalDistance;

        const cp1x = startX + (turnIntensity * 1.5);
        const cp1y = startY - (totalDistance * 0.3);

        const cp2x = startX + turnIntensity - fadeIntensity;
        const cp2y = peakY;

        const endX = startX + (turnIntensity * 0.5) - fadeIntensity;

        // Draw the Flight Path Line
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, endY);
        ctx.strokeStyle = '#4caf50';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Draw launch pad dot
        ctx.beginPath();
        ctx.arc(startX, startY, 6, 0, 2 * Math.PI);
        ctx.fillStyle = '#fff';
        ctx.fill();

        // Update Text readouts next to sliders
        inputs.forEach(id => {
            if(id !== 'releaseAngle') document.getElementById(id + 'Val').innerText = elements[id].value;
        });

        ctx.setTransform(1, 0, 0, 1, 0, 0); // reset scale
    }

    // Event listeners to redraw when inputs shift
    inputs.forEach(id => elements[id].addEventListener('input', drawFlightPath));
    elements.releaseAngle.addEventListener('change', drawFlightPath);
    window.addEventListener('resize', resizeCanvas);
    
    // Initial setup
    setTimeout(resizeCanvas, 50);
</script>

</body>
</html>
